    <script>
        // Store trades in localStorage
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let currentDate = new Date();

        // Pair pip values and contract sizes
        const pairConfig = {
            'EURUSD': { pipValue: 10, digits: 4 },  // $10 per pip for standard lot
            'GBPUSD': { pipValue: 10, digits: 4 },
            'USDJPY': { pipValue: 9.32, digits: 2 }, // Different calculation for JPY pairs
            'AUDUSD': { pipValue: 10, digits: 4 },
            'USDCAD': { pipValue: 7.94, digits: 4 },
            'NZDUSD': { pipValue: 10, digits: 4 },
            'XAUUSD': { pipValue: 100, digits: 2 }, // Gold: $100 per pip for standard lot
            'XAGUSD': { pipValue: 50, digits: 3 },   // Silver: $50 per pip for standard lot
            'BTCUSD': { pipValue: 1000, digits: 1 }, // Crypto: $1000 per point for standard lot
            'ETHUSD': { pipValue: 500, digits: 2 }   // Ethereum: $500 per point for standard lot
        };

        function calculatePL(pair, entry, exit, lotSize, type) {
            const config = pairConfig[pair] || { pipValue: 10, digits: 4 };
            let priceDiff;
            
            if (pair === 'USDJPY') {
                // For JPY pairs, pip is 0.01
                priceDiff = type === 'BUY' ? (exit - entry) * 100 : (entry - exit) * 100;
            } else if (pair === 'XAUUSD') {
                // For Gold, pip is 0.01
                priceDiff = type === 'BUY' ? (exit - entry) * 100 : (entry - exit) * 100;
            } else if (pair === 'BTCUSD' || pair === 'ETHUSD') {
                // For Crypto, point movement
                priceDiff = type === 'BUY' ? (exit - entry) : (entry - exit);
            } else {
                // For Forex, pip is 0.0001
                priceDiff = type === 'BUY' ? (exit - entry) * 10000 : (entry - exit) * 10000;
            }
            
            const pips = Math.round(priceDiff * 100) / 100;
            const pl = pips * config.pipValue * lotSize;
            
            return { pips, pl: Math.round(pl * 100) / 100 };
        }

        function addTrade() {
            const date = document.getElementById('tradeDate').value;
            const setupName = document.getElementById('setupName').value || 'No Setup';
            const pair = document.getElementById('pair').value;
            const tradeType = document.getElementById('tradeType').value;
            const entryPrice = parseFloat(document.getElementById('entryPrice').value);
            const exitPrice = parseFloat(document.getElementById('exitPrice').value);
            const lotSize = parseFloat(document.getElementById('lotSize').value);
            const timeFrame = document.getElementById('timeFrame').value;
            const result = document.getElementById('result').value;
            const notes = document.getElementById('notes').value;

            if (!date || !entryPrice || !exitPrice) {
                alert('Please fill in all required fields');
                return;
            }

            const { pips, pl } = calculatePL(pair, entryPrice, exitPrice, lotSize, tradeType);

            const trade = {
                id: Date.now(),
                date,
                setupName,
                pair,
                tradeType,
                entryPrice,
                exitPrice,
                lotSize,
                timeFrame,
                pips,
                pl,
                result: pl > 0 ? 'WIN' : pl < 0 ? 'LOSS' : 'BE',
                notes
            };

            trades.push(trade);
            localStorage.setItem('trades', JSON.stringify(trades));
            updateDisplay();
            clearForm();
        }

        function clearForm() {
            document.getElementById('setupName').value = '';
            document.getElementById('entryPrice').value = '';
            document.getElementById('exitPrice').value = '';
            document.getElementById('notes').value = '';
        }

        function deleteTrade(id) {
            trades = trades.filter(t => t.id !== id);
            localStorage.setItem('trades', JSON.stringify(trades));
            updateDisplay();
        }

        function updateDisplay() {
            updateSummary();
            updateTradesTable();
            updateCalendar();
            updateCharts();
        }

        function updateSummary() {
            const totalTrades = trades.length;
            const totalProfit = trades.filter(t => t.pl > 0).reduce((sum, t) => sum + t.pl, 0);
            const totalLoss = Math.abs(trades.filter(t => t.pl < 0).reduce((sum, t) => sum + t.pl, 0));
            const netPL = trades.reduce((sum, t) => sum + t.pl, 0);
            const winTrades = trades.filter(t => t.pl > 0).length;
            const winRate = totalTrades > 0 ? ((winTrades / totalTrades) * 100).toFixed(1) : 0;

            document.getElementById('totalTrades').textContent = totalTrades;
            document.getElementById('totalProfit').textContent = `$${totalProfit.toFixed(2)}`;
            document.getElementById('totalLoss').textContent = `$${totalLoss.toFixed(2)}`;
            document.getElementById('netPL').textContent = `$${netPL.toFixed(2)}`;
            document.getElementById('netPL').className = netPL >= 0 ? 'value profit' : 'value loss';
            document.getElementById('winRate').textContent = `${winRate}%`;
        }

        function updateTradesTable() {
            const tbody = document.getElementById('tradesBody');
            tbody.innerHTML = '';

            // Sort trades by date (newest first)
            const sortedTrades = [...trades].sort((a, b) => new Date(b.date) - new Date(a.date));

            sortedTrades.forEach(trade => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${trade.date}</td>
                    <td>${trade.setupName}</td>
                    <td>${trade.pair}</td>
                    <td style="color: ${trade.tradeType === 'BUY' ? '#28a745' : '#dc3545'}">${trade.tradeType}</td>
                    <td>${trade.entryPrice}</td>
                    <td>${trade.exitPrice}</td>
                    <td>${trade.lotSize}</td>
                    <td>${trade.timeFrame}</td>
                    <td class="${trade.pl >= 0 ? 'profit' : 'loss'}">$${trade.pl.toFixed(2)}</td>
                    <td class="${trade.pips >= 0 ? 'profit' : 'loss'}">${trade.pips.toFixed(1)}</td>
                    <td style="color: ${trade.result === 'WIN' ? '#28a745' : trade.result === 'LOSS' ? '#dc3545' : '#ffc107'}">${trade.result}</td>
                    <td><button onclick="deleteTrade(${trade.id})" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Delete</button></td>
                `;
            });
        }

        function updateCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonthYear').textContent = 
                new Date(year, month, 1).toLocaleString('default', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let calendarHTML = '';
            
            // Add day names
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                calendarHTML += `<div class="calendar-day" style="background: #667eea; color: white; min-height: auto; text-align: center;">${day}</div>`;
            });

            // Add empty cells for days before month starts
            for (let i = 0; i < firstDay; i++) {
                calendarHTML += '<div class="calendar-day"></div>';
            }

            // Add days of month
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTrades = trades.filter(t => t.date === dateStr);
                
                let dayClass = 'calendar-day';
                if (dayTrades.length > 0) dayClass += ' has-trades';

                let dayContent = `<div class="day-number">${day}</div>`;
                
                dayTrades.forEach(trade => {
                    const plClass = trade.pl >= 0 ? 'profit-indicator' : 'loss-indicator';
                    dayContent += `<div class="trade-indicator ${plClass}">${trade.pair} $${trade.pl.toFixed(0)}</div>`;
                });

                calendarHTML += `<div class="${dayClass}">${dayContent}</div>`;
            }

            document.getElementById('calendarGrid').innerHTML = calendarHTML;
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            updateCalendar();
        }

        function updateCharts() {
            updateDailyChart();
            updateWeeklyChart();
            updateMonthlyChart();
        }

        function updateDailyChart() {
            const last7Days = [];
            const dailyPL = [];
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                
                const dayTrades = trades.filter(t => t.date === dateStr);
                const dayPL = dayTrades.reduce((sum, t) => sum + t.pl, 0);
                
                last7Days.push(date.toLocaleDateString('default', { weekday: 'short' }));
                dailyPL.push(dayPL);
            }

            createBarChart('dailyChart', last7Days, dailyPL);
        }

        function updateWeeklyChart() {
            const weeks = ['Week 1', 'Week 2', 'Week 3', 'Week 4'];
            const weeklyPL = [0, 0, 0, 0];

            trades.forEach(trade => {
                const date = new Date(trade.date);
                const weekOfMonth = Math.floor((date.getDate() - 1) / 7);
                if (weekOfMonth < 4) {
                    weeklyPL[weekOfMonth] += trade.pl;
                }
            });

            createBarChart('weeklyChart', weeks, weeklyPL);
        }

        function updateMonthlyChart() {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const monthlyPL = new Array(12).fill(0);

            trades.forEach(trade => {
                const month = new Date(trade.date).getMonth();
                monthlyPL[month] += trade.pl;
            });

            // Show last 6 months
            const currentMonth = new Date().getMonth();
            const last6Months = [];
            const last6PL = [];
            
            for (let i = 5; i >= 0; i--) {
                let monthIndex = (currentMonth - i + 12) % 12;
                last6Months.push(months[monthIndex]);
                last6PL.push(monthlyPL[monthIndex]);
            }

            createBarChart('monthlyChart', last6Months, last6PL);
        }

        function createBarChart(elementId, labels, values) {
            const chart = document.getElementById(elementId);
            chart.innerHTML = '';

            const maxValue = Math.max(...values.map(Math.abs), 1);

            values.forEach((value, index) => {
                const barHeight = Math.abs((value / maxValue) * 150);
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = barHeight + 'px';
                bar.style.background = value >= 0 ? 
                    'linear-gradient(135deg, #28a745 0%, #20c997 100%)' : 
                    'linear-gradient(135deg, #dc3545 0%, #c82333 100%)';
                bar.setAttribute('data-value', `$${value.toFixed(0)}`);

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = labels[index];

                const barContainer = document.createElement('div');
                barContainer.style.display = 'flex';
                barContainer.style.flexDirection = 'column';
                barContainer.style.alignItems = 'center';
                barContainer.appendChild(bar);
                barContainer.appendChild(label);

                chart.appendChild(barContainer);
            });
        }

        function showTab(tab) {
            // Update active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Filter trades based on tab
            const filteredTrades = filterTradesByTime(tab);
            displayFilteredTrades(filteredTrades);
        }

        function filterTradesByTime(tab) {
            const now = new Date();
            let startDate;

            switch(tab) {
                case 'daily':
                    startDate = new Date(now.setHours(0, 0, 0, 0));
                    break;
                case 'weekly':
                    startDate = new Date(now.setDate(now.getDate() - now.getDay()));
                    break;
                case 'monthly':
                    startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                    break;
                default:
                    return trades;
            }

            return trades.filter(t => new Date(t.date) >= startDate);
        }

        function displayFilteredTrades(filteredTrades) {
            const tbody = document.getElementById('tradesBody');
            tbody.innerHTML = '';

            filteredTrades.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(trade => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${trade.date}</td>
                    <td>${trade.setupName}</td>
                    <td>${trade.pair}</td>
                    <td style="color: ${trade.tradeType === 'BUY' ? '#28a745' : '#dc3545'}">${trade.tradeType}</td>
                    <td>${trade.entryPrice}</td>
                    <td>${trade.exitPrice}</td>
                    <td>${trade.lotSize}</td>
                    <td>${trade.timeFrame}</td>
                    <td class="${trade.pl >= 0 ? 'profit' : 'loss'}">$${trade.pl.toFixed(2)}</td>
                    <td class="${trade.pips >= 0 ? 'profit' : 'loss'}">${trade.pips.toFixed(1)}</td>
                    <td style="color: ${trade.result === 'WIN' ? '#28a745' : trade.result === 'LOSS' ? '#dc3545' : '#ffc107'}">${trade.result}</td>
                    <td><button onclick="deleteTrade(${trade.id})" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Delete</button></td>
                `;
            });
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
